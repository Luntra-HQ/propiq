# Pre-commit hooks configuration for PropIQ
# Runs automated checks before each commit to catch issues early
#
# Installation:
#   pip install pre-commit
#   pre-commit install
#
# Manual run:
#   pre-commit run --all-files

repos:
  # Git-secrets - Prevent committing API keys and secrets
  - repo: https://github.com/awslabs/git-secrets
    rev: 1.3.0
    hooks:
      - id: git-secrets
        name: Detect secrets
        entry: git-secrets --scan
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit, push]

  # Built-in pre-commit hooks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      # Prevent committing large files (>500KB)
      - id: check-added-large-files
        args: ['--maxkb=500']

      # Detect private keys
      - id: detect-private-key

      # Check JSON files are valid
      - id: check-json

      # Check YAML files are valid
      - id: check-yaml
        exclude: '^\.github/'  # GitHub Actions may have special syntax

      # Prevent merge conflict markers
      - id: check-merge-conflict

      # Ensure files end with newline
      - id: end-of-file-fixer

      # Remove trailing whitespace
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]

      # Detect AWS credentials in code
      - id: detect-aws-credentials
        args: ['--allow-missing-credentials']

  # Python code quality (backend)
  - repo: https://github.com/psf/black
    rev: 23.12.1
    hooks:
      - id: black
        name: Format Python code (black)
        files: '^backend/.*\.py$'

  # Python linting
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        name: Lint Python code (flake8)
        files: '^backend/.*\.py$'
        args:
          - '--max-line-length=120'
          - '--ignore=E203,W503'  # Black compatibility

  # TypeScript/JavaScript formatting (frontend)
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v4.0.0-alpha.8
    hooks:
      - id: prettier
        name: Format frontend code (prettier)
        files: '^frontend/.*\.(ts|tsx|js|jsx|json|css|md)$'
        exclude: '^frontend/dist/|^frontend/node_modules/'

  # ESLint for frontend
  - repo: https://github.com/pre-commit/mirrors-eslint
    rev: v9.0.0-beta.2
    hooks:
      - id: eslint
        name: Lint frontend code (eslint)
        files: '^frontend/.*\.(ts|tsx|js|jsx)$'
        exclude: '^frontend/dist/|^frontend/node_modules/'
        additional_dependencies:
          - eslint@8.56.0
          - '@typescript-eslint/parser@6.19.0'
          - '@typescript-eslint/eslint-plugin@6.19.0'

  # Security scanning for Python dependencies
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.7
    hooks:
      - id: bandit
        name: Security scan Python code (bandit)
        files: '^backend/.*\.py$'
        args: ['-ll', '-i']  # Only report high/medium severity

  # Check for TODO/FIXME/XXX comments
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: check-toml
      - id: check-xml

# Global settings
default_language_version:
  python: python3.11
  node: system

# Files to exclude from all hooks
exclude: |
  (?x)^(
      .*\.min\.(js|css)$|
      .*\.map$|
      frontend/dist/.*|
      frontend/node_modules/.*|
      backend/venv/.*|
      backend/__pycache__/.*|
      \.git/.*|
      \.env.*|
      \.DS_Store
  )$

# CI mode - fail fast on first error
fail_fast: false

# Minimum version
minimum_pre_commit_version: '2.20.0'
